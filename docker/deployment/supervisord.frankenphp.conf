[program:octane]
process_name = %(program_name)s_%(process_num)s
command = php %(ENV_WORKDIR)s/artisan octane:frankenphp --host=0.0.0.0 --port=8000 --admin-host=0.0.0.0 --admin-port=2019 --caddyfile=/etc/Caddyfile --log-level=%(ENV_LOG_LEVEL)s
user = %(ENV_USER)s
priority = 1
autostart = true
autorestart = true
stopwaitsecs = 30
stopasgroup = true
killasgroup = true
environment = LARAVEL_OCTANE = "1"
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0

[program:horizon]
process_name = %(program_name)s_%(process_num)s
command = php %(ENV_WORKDIR)s/artisan horizon
user = %(ENV_USER)s
priority = 3
autostart = %(ENV_WITH_HORIZON)s
autorestart = true
stopasgroup = true
killasgroup = true
stdout_logfile = %(ENV_WORKDIR)s/storage/logs/horizon.log
stdout_logfile_maxbytes = 200MB
stderr_logfile = %(ENV_WORKDIR)s/storage/logs/horizon.log
stderr_logfile_maxbytes = 200MB
stopwaitsecs = 3600

[program:scheduler]
process_name = %(program_name)s_%(process_num)s
command = supercronic -overlapping /etc/supercronic/laravel
user = %(ENV_USER)s
autostart = %(ENV_WITH_SCHEDULER)s
autorestart = true
stopasgroup = true
killasgroup = true
stdout_logfile = %(ENV_WORKDIR)s/storage/logs/scheduler.log
stdout_logfile_maxbytes = 200MB
stderr_logfile = %(ENV_WORKDIR)s/storage/logs/scheduler.log
stderr_logfile_maxbytes = 200MB

[program:clear-scheduler-cache]
process_name = %(program_name)s_%(process_num)s
command = php %(ENV_WORKDIR)s/artisan schedule:clear-cache
user = %(ENV_USER)s
autostart = %(ENV_WITH_SCHEDULER)s
autorestart = false
startsecs = 0
startretries = 1
stdout_logfile = %(ENV_WORKDIR)s/storage/logs/scheduler.log
stdout_logfile_maxbytes = 200MB
stderr_logfile = %(ENV_WORKDIR)s/storage/logs/scheduler.log
stderr_logfile_maxbytes = 200MB

[program:reverb]
process_name = %(program_name)s_%(process_num)s
command = php %(ENV_WORKDIR)s/artisan reverb:start
user = %(ENV_USER)s
priority = 2
autostart = %(ENV_WITH_REVERB)s
autorestart = true
stopasgroup = true
killasgroup = true
stdout_logfile = %(ENV_WORKDIR)s/storage/logs/reverb.log
stdout_logfile_maxbytes = 200MB
stderr_logfile = %(ENV_WORKDIR)s/storage/logs/reverb.log
stderr_logfile_maxbytes = 200MB
minfds = 10000

[program:inertia-ssr]
process_name = %(program_name)s_%(process_num)s
command = php %(ENV_WORKDIR)s/artisan inertia:start-ssr
user = %(ENV_USER)s
priority = 2
autostart = %(ENV_WITH_INERTIA_SSR)s
autorestart = true
stopasgroup = true
killasgroup = true
stdout_logfile = %(ENV_WORKDIR)s/storage/logs/pnpm.log
stdout_logfile_maxbytes = 200MB
stderr_logfile = %(ENV_WORKDIR)s/storage/logs/pnpm_error.log
stderr_logfile_maxbytes = 200MB

[include]
files = /etc/supervisord.conf
